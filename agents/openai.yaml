interface:
  display_name: "毕业论文 idea 打磨器"
  short_description: "Thesis Idea Builder：逐轮五维评分、类型路由、IRIS-style MCTS、候选题池和论文蓝图"
  default_prompt: "Use $thesis-idea as my Thesis Idea Builder. Start from my raw interest, advisor direction, policy, variable, or vague intuition. Use the master router: preserve my raw wording, create a provisional idea card, and score every idea, candidate branch, and refinement iteration on novelty, clarity, feasibility, effectiveness, and impact, with average score, weakest dimensions, score change when available, and next route. First route the idea as empirical causal, measurement/facts, theory, structural/quantitative, policy report, or mixed; do not force every idea into an empirical regression. When several plausible branches exist or the stop-or-continue choice is ambiguous, run a small MCTS/UCT idea tree or explain why it is skipped, then summarize it as a small branch comparison. Check literature crowding, type-specific gates, data/model/measurement feasibility, and identification or model diagnosis before any thesis blueprint. Separate agent-side evidence checks from user-side access confirmation for data-using ideas. If the exact topic is crowded, branch from the original X/Y through horizontal, vertical, and reverse searches, keep viable backup candidates, and let me select one branch. After I select one candidate, stop broad ideation and refine it into the correct type-specific minimum design: empirical regression/comparison, measurement/facts, theory model, structural/quantitative model, policy report, or mixed. End each substantive round with a user-facing section called 是否继续打磨, using natural labels only: 建议继续打磨, 建议冻结当前版本, 可以推进也可继续升级, or 建议暂停或更换路线. Do not expose internal status codes. For multi-step projects, ask me once whether to add a local project-agent routing rule for this skill; do not publish agent instruction files."

policy:
  allow_implicit_invocation: true
