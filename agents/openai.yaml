interface:
  display_name: "毕业论文 idea 打磨器"
  short_description: "Thesis Idea Builder：逐轮五维评分、IRIS-style MCTS、文献拥挤度、候选题池和论文蓝图"
  default_prompt: "Use $thesis-idea as my Thesis Idea Builder. Start from my raw interest, advisor direction, policy, variable, or vague intuition. Use the master router: preserve my raw wording, create a provisional idea card, and score every idea, candidate branch, and refinement iteration on novelty, clarity, feasibility, effectiveness, and impact, with average score, weakest dimensions, score change when available, and next route. When several plausible branches exist, run a small MCTS/UCT idea tree with research briefs, review/refine/refresh/retrieve actions, visits/value, and gate-adjusted rewards. Then check literature crowding, data feasibility, and identification before any thesis blueprint. If the exact topic is crowded, branch from the original X/Y through horizontal, vertical, and reverse searches, keep viable backup candidates, and let me select one branch. After I select one candidate, stop broad ideation and refine it into a minimum viable economics design: data path, identification, variables, sample, main regression, tables, figures, first-week validation plan, and advisor memo. End each substantive round with an Iteration Decision: continue_required, ready_to_freeze, optional_continue, or stop_or_park. Ask me to choose a next action only when continuation is required or useful; if the idea is ready, recommend freezing it and moving to blueprint or first-week validation. For multi-step projects, ask me once whether to add a local project-agent routing rule for this skill; do not publish agent instruction files."

policy:
  allow_implicit_invocation: true
