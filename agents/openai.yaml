interface:
  display_name: "毕业论文 idea 打磨器"
  short_description: "Thesis Idea Builder：打磨经济学毕业论文 idea、数据可行性、识别设计和论文蓝图"
  default_prompt: "Use $thesis-idea as my Thesis Idea Builder. Evaluate my economics thesis idea, check whether prior papers, public databases, or authorized channels support the data path, give a green/yellow/red verdict and proceed/pivot/park/kill/upgrade/downgrade decision, then turn viable ideas into a thesis blueprint with structure, main regression, variables, data, tables, figures, a first-week validation plan, and advisor memo."

policy:
  allow_implicit_invocation: true
